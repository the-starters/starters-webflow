<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Search — The Starters</title>

  <!--
    Real tab solution loaded relatively for local/HTTP serving from
    starters-webflow/explore-search/.
    jsDelivr equivalents for Webflow paste-in:
      https://cdn.jsdelivr.net/gh/the-starters/starters-webflow@latest/global-embeds/tabs/tabs.css
      https://cdn.jsdelivr.net/gh/the-starters/starters-webflow@latest/global-embeds/tabs/tabs.js
  -->
  <link rel="stylesheet" href="../global-embeds/tabs/tabs.css">
  <script src="../global-embeds/tabs/tabs.js" defer></script>

  <style>
    :root {
      --bg: #f6f6f4;
      --ink: #111111;
      --muted: #6b6b6b;
      --chip-bg: #ececea;
      --chip-bg-hover: #e2e2df;
      --chip-selected-bg: #111111;
      --chip-selected-ink: #ffffff;
      --line: #e2e2de;
      --card-bg: #ffffff;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .search-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 32px 64px;
    }

    /* ---------- Header ---------- */
    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .wordmark {
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 15px;
      white-space: nowrap;
    }
    .search-slot {
      flex: 1 1 auto;
    }
    /* Style whatever the sibling drops in as the search input */
    .search-slot input,
    #search-brilliance-input {
      width: 100%;
      font-size: 22px;
      font-family: inherit;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--ink);
      padding: 10px 4px;
      outline: none;
    }
    .search-slot input::placeholder,
    #search-brilliance-input::placeholder { color: var(--muted); }

    .close-btn {
      flex: 0 0 auto;
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      border-radius: var(--radius-pill);
      padding: 9px 18px;
      cursor: pointer;
    }

    /* ---------- Two-column layout ---------- */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 48px;
      margin-top: 32px;
    }

    /* ---------- Sidebar ---------- */
    .sidebar-heading {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 14px;
    }
    .sidebar-group + .sidebar-group { margin-top: 36px; }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      background: var(--chip-bg);
      border: none;
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .chip:hover { background: var(--chip-bg-hover); }

    /* ---------- Main column / tabs ---------- */
    .main-col { min-width: 0; }

    /* button-list = pill bar, top-right */
    [data-tab-component="button-list"] {
      display: inline-flex;
      gap: 4px;
      background: var(--chip-bg);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin: 0 0 28px auto;
      width: max-content;
      float: right;
    }
    [data-tab-component="button-list"] > button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-pill);
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }
    [data-tab-component="button-list"] > button.is-active {
      background: var(--chip-selected-bg);
      color: var(--chip-selected-ink);
    }
    /* Live hit-count badge inside each tab button */
    [data-tab-component="button-list"] > button [data-tab-count-for] {
      color: inherit;
      opacity: 0.55;
    }

    /* Clear the float so panels sit below the pill bar */
    [wf-algolia-element="results"] { clear: both; }

    /* "N matches found. Sorted by relevance" line (N = active tab's count,
       kept live by explore-search-tab-counts.js via [data-active-tab-count]) */
    .results-count {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .panel-heading {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: 34px;
      line-height: 1.1;
      margin: 0 0 20px;
    }

    /* ---------- Results grid (Algolia section clones name spans) ----------
       The engine shows a section by inline-setting `display: block`, which
       would clobber the grid — force grid back, but only while the section
       is NOT inline-hidden, so the engine's 0-hit hiding keeps working. */
    [wf-algolia-element="section"] {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    [wf-algolia-element="section"]:not([style*="none"]) {
      display: grid !important;
    }
    [wf-algolia-element="section"] > * {
      display: block;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 15px;
      color: var(--ink);
      text-decoration: none;
    }

    /* ---------- Fix A: non-card children inside each section ----------
       The grid rule above styles EVERY direct child as a card. The
       section-label div is structural, not a hit, so override it back
       to a full-width, chrome-less caption. */
    [wf-algolia-element="section-label"] {
      grid-column: 1 / -1;
      display: block;
      background: none;
      border: none;
      padding: 0;
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    /* Transition loader (shown by explore-search-list-loader.js) */
    .list-loader {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }

    /* Single no-results element at the results-container level */
    [wf-algolia-element="no-results"] {
      background: none;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
      padding: 16px 18px;
      margin-top: 12px;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; gap: 32px; }
      [wf-algolia-element="section"] { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!--
    wf-algolia containment rules (multi-section federated mode):
    1. [wf-algolia-element="search-wrapper"] is the boundary: the input (anywhere inside it)
       plus ONE [wf-algolia-element="results"] container.
    2. The results container holds N [wf-algolia-element="section"] divs, each carrying its
       own wf-algolia-index + wf-algolia-hits, each with a hidden template inside.
    3. wf-algolia-index lives ONLY on section divs (Freelancers3.0-dev / LearnContent).
    4. Behavior: the engine natively hides the results container on an empty query, on
       Escape, and on clicks outside the search-wrapper, and hides 0-hit sections
       individually. explore-search-default-results.js overrides the empty-query side of
       this (see point 6): it keeps the results container visible and counters the
       Escape / outside-click hides so the results area is ALWAYS visible.
    5. No data-index on the bootstrap script — each section owns its index (no default inheritance).
    6. UX: native live search-as-you-type — the engine's debounced listener is bound
       directly to the visible input. The results container is authored with
       style="display: none" ONLY to avoid a flash before the default lists load;
       explore-search-default-results.js reveals it — filled with ALL items from both
       indices (empty-query "top" ranking) — whenever the query is empty, and the engine
       takes over rendering while a query is typed. Escape / outside-click hides are
       countered, so the results area stays visible in every state.
    7. The tab buttons carry [data-tab-count-for] spans; explore-search-tab-counts.js
       (loaded below with defer) fills them with each index's total nbHits (bare
       number) by reading the engine's own Algolia responses, and resets them to 0 on
       input clear. No extra Algolia operations are made.
    8. The "N matches found" line inside the results container carries a
       [data-active-tab-count] span, kept equal to the ACTIVE tab's count (re-synced
       on tab clicks — no new query). The same attribute on a span inside the static
       sentence ports as-is to Webflow. The engine's own results-count role is
       intentionally NOT used (it would overwrite this markup).
    9. Sidebar chips use a TEMPLATE-CLONE grammar the designer owns: each list div
       ([data-explore-search-element="most-searched-list" / "recent-searched-list"])
       authors ONE hidden [data-explore-search-element="template"] button with a
       [data-explore-search-element="title"] slot inside. The scripts detach the
       template at load and clone it per query (display cleared, title filled,
       data-fill-search + data-explore-search-injected stamped). Scripts key only on
       these attributes — never on classes. Most Searched pulls live Query
       Suggestions (index from data-explore-most-search-index, default
       "explore_query_suggestions"; credentials from the engine script tag) and falls
       back to built-in labels with one console.info. Recent Searches renders from
       localStorage ("explore-recent-searches", max 6, most-recent first,
       case-insensitive dedupe; commit on chip fill or a 1.5s typing pause with >= 3
       chars). No placeholder recents: the whole
       [data-explore-search-element="recent-search-wrapper"] group is authored
       HIDDEN (inline display:none / Display:None in Webflow) and the script reveals
       it only while >= 1 entry is stored — including live at the first mid-session
       commit. Script missing or storage blocked = section never appears.
    10. Behavior is split across six standalone deferred scripts loaded at the end
       of body (order doesn't matter; each is optional per use case and bails out
       quietly if its markup is absent): chip-fill, tab-counts, most-searched,
       recent-searches, default-results, list-loader. Chip clicks reach the recents
       recorder ONLY via the "explore-search:commit" CustomEvent — the files share
       no globals.
    11. Transition loader: an authored-hidden [data-loader] element inside the
       search-wrapper is shown by explore-search-list-loader.js while Algolia
       "/queries" requests are in flight (the panel-list is masked with
       visibility:hidden meanwhile, keeping layout space). Minimum display 200ms;
       a numeric attribute value overrides (data-loader="350"). Loader missing or
       embed absent = nothing ever shows (fail-safe).
  -->

  <!-- Algolia outside-click boundary: header + sidebar + main all live inside -->
  <div wf-algolia-element="search-wrapper" class="search-wrapper">

    <!-- ===== Header ===== -->
    <header class="header">
      <div class="wordmark">THE STARTERS</div>
      <div class="search-slot">
        <!-- The engine's debounced live-search listener binds here directly:
             results update as the user types (no Enter needed). -->
        <input
          type="text"
          id="search-brilliance-input"
          wf-algolia-element="search-input"
          placeholder="Search starters and intelligence…"
        >
      </div>
      <button type="button" class="close-btn">CLOSE</button>
    </header>

    <!-- ===== Two-column layout ===== -->
    <div class="layout">

      <!-- ----- Left sidebar ----- -->
      <aside class="sidebar">
        <div class="sidebar-group">
          <h2 class="sidebar-heading">Most Searched</h2>
          <!-- Template-clone grammar: the hidden template button is detached
               by explore-search-most-searched.js at load and cloned once per
               query (live QS suggestions, or built-in fallback labels on failure).
               Designers own the chip look — the script keys ONLY on
               data-explore-search-element attributes, never on classes
               (.chip-list / .chip here are demo styling only).
               data-explore-most-search-index overrides the default QS index
               ("explore_query_suggestions"). Author the template with inline
               display:none to avoid pre-init flash. -->
          <div
            class="chip-list"
            data-explore-search-element="most-searched-list"
            data-explore-most-search-index="explore_query_suggestions"
          >
            <button type="button" class="chip" data-explore-search-element="template" style="display: none">
              <div data-explore-search-element="title"></div>
            </button>
          </div>
        </div>

        <!-- Recent-search wrapper: authored HIDDEN (inline display:none here;
             Display:None in Webflow Designer). explore-search-recent-searches.js
             reveals it only when >= 1 recent search is stored — on load or live
             at the first commit. Fail-safe: if the script doesn't load or
             storage is blocked, the section simply never appears (no empty
             heading flash, no orphaned UI). -->
        <div
          class="sidebar-group"
          data-explore-search-element="recent-search-wrapper"
          style="display: none"
        >
          <h2 class="sidebar-heading">Recent Searches</h2>
          <!-- Template-clone grammar (same as Most Searched): the hidden
               template is detached at load and cloned once per stored recent
               search (localStorage "explore-recent-searches"). No placeholder
               chips — with no stored entries the whole wrapper stays hidden. -->
          <div class="chip-list" data-explore-search-element="recent-searched-list">
            <button type="button" class="chip" data-explore-search-element="template" style="display: none">
              <div data-explore-search-element="title"></div>
            </button>
          </div>
        </div>
      </aside>

      <!-- ----- Main column: tab component ----- -->
      <main class="main-col">
        <div data-tab-component="wrapper">

          <!-- Pill bar: two tab buttons (direct children of button-list) -->
          <!-- Count spans are updated live by explore-search-tab-counts.js from
               the engine's own Algolia responses (per-index total nbHits, bare number). -->
          <div data-tab-component="button-list">
            <button type="button">TALENTS <span data-tab-count-for="Freelancers3.0-dev">0</span></button>
            <button type="button">INTELLIGENCE <span data-tab-count-for="LearnContent">0</span></button>
          </div>

          <!--
            Federated results container wrapping the panel-list. The engine
            finds it via searchWrapper.querySelector('[wf-algolia-element="results"]').
            tabs.js finds panel-list via tabWrap.querySelector() at any depth,
            so this wrapper is safe.
          -->
          <!-- Authored hidden ONLY to avoid a flash before the default lists load.
               explore-search-default-results.js reveals this container with ALL items
               from both indices whenever the query is empty, the engine takes over
               while a query is typed, and Escape / outside-click hides are countered —
               so the results area is effectively always visible. -->
          <div wf-algolia-element="results" style="display: none">
            <!-- Live matches line: number = the ACTIVE tab's count. Inside the
                 results container so it hides/shows with it. Kept current by
                 explore-search-tab-counts.js via [data-active-tab-count] (same
                 hook ports to Webflow: put the attribute on a span in the sentence). -->
            <div class="results-count"><span data-active-tab-count>0</span> matches found. Sorted by relevance</div>

            <!-- Transition loader: authored hidden; explore-search-list-loader.js
                 shows it while Algolia list requests are in flight (min 200ms —
                 override with a numeric value, e.g. data-loader="350") and hides
                 the panel-list below via visibility:hidden meanwhile. -->
            <div data-loader="1500" style="display: none" class="list-loader">Loading…</div>

            <div data-tab-component="panel-list">

              <!-- Panel 1: freelancers -->
              <div>
                <h2 class="panel-heading">Top Starters</h2>
                <div
                  wf-algolia-element="section"
                  wf-algolia-index="Freelancers3.0-dev"
                  wf-algolia-hits="6"
                >
                  <div wf-algolia-element="section-label">Top Starters</div>

                  <!-- Hidden hit-card template — cloned once per hit. Must stay display:none. -->
                  <a wf-algolia-element="template" style="display: none">
                    <span wf-algolia-text="name"></span>
                  </a>

                  <!-- ASSUMPTION: field name `name` is a guess. If cards render but stay
                       empty, verify the real attribute name in the Freelancers3.0-dev
                       index (case-sensitive — `Name` ≠ `name`).
                       Role names verified against the published bundle v1.0.4
                       (multi-section federated mode). -->
                </div>
              </div>

              <!-- Panel 2: articles -->
              <div>
                <h2 class="panel-heading">Top Intelligence</h2>
                <div
                  wf-algolia-element="section"
                  wf-algolia-index="LearnContent"
                  wf-algolia-hits="6"
                >
                  <div wf-algolia-element="section-label">Top Intelligence</div>

                  <a wf-algolia-element="template" style="display: none">
                    <span wf-algolia-text="title"></span>
                  </a>

                  <!-- ASSUMPTION: field name `title` is a guess. If cards render empty,
                       check the real attribute name in the LearnContent index
                       (case-sensitive).
                       Role names verified against the published bundle v1.0.4
                       (multi-section federated mode). -->
                </div>
              </div>

            </div>

            <!-- Single no-results element at the results-container level
                 (this mode does not support per-section no-results). -->
            <div wf-algolia-element="no-results" style="display: none">No matches found.</div>
          </div>

        </div>
      </main>

    </div><!-- /.layout -->
  </div><!-- /[wf-algolia-element="search-wrapper"] -->

  <script>
    /* Non-Webflow demo shim — REMOVE when pasting into Webflow.
       wf-algolia bootstraps via the Webflow ready-queue
       (window.Webflow.push(initFn)); outside Webflow nothing drains that
       queue, so run queued callbacks ourselves once the DOM is ready.
       MUST stay inline before the async module tag below (an async module
       can execute before deferred scripts — the shim has to win that race).
       Also drains any callbacks that were queued before this ran. */
    (function () {
      function run(fn) {
        if (typeof fn !== "function") return;
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", function () { fn(); });
        } else {
          fn();
        }
      }
      var q = window.Webflow;
      window.Webflow = { push: run };
      if (Array.isArray(q)) q.forEach(run);
    })();
  </script>

  <!-- Algolia bootstrap script (spliced in by sibling agent) -->
  <!-- Place in Webflow Project Settings → Custom Code → FOOTER (not Head).
       No data-index on purpose: each section below carries its own
       wf-algolia-index, so there is no default-index inheritance.
       In Webflow, do NOT include the demo shim above — Webflow provides
       the real ready-queue that drains these callbacks. -->
  <script
    async
    type="module"
    src="https://cdn.jsdelivr.net/npm/@candid-leap/wf-algolia@1/dist/index.js"
    data-app-id="PKVW6M9OPZ"
    data-search-key="296cba989b67e9a61f8edf6592c3870e"
    data-insights="true"
  ></script>

  <!-- Explore-search feature embeds. Five standalone deferred scripts —
       load order does NOT matter and each is optional per use case (a file
       bails out quietly when its markup is absent). Deferred scripts run
       before DOMContentLoaded, so tab-counts' fetch/XHR interception is
       installed before the engine initializes via the shim above, and
       default-results captures the section templates before the engine
       detaches them at init.
       Cross-file communication happens only via the "explore-search:commit"
       CustomEvent (chip-fill -> recent-searches). default-results reveals the
       results container with the full default lists on an empty query (see the
       containment-rules note above). jsDelivr equivalents for Webflow paste-in:
         https://cdn.jsdelivr.net/gh/the-starters/starters-webflow@latest/explore-search/<file>.js -->
  <script src="explore-search-chip-fill.js" defer></script>
  <script src="explore-search-tab-counts.js" defer></script>
  <script src="explore-search-most-searched.js" defer></script>
  <script src="explore-search-recent-searches.js" defer></script>
  <script src="explore-search-default-results.js" defer></script>
  <script src="explore-search-list-loader.js" defer></script>

</body>
</html>
